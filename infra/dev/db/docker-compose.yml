services:
  url-db:
    image: mysql:8.4
    container_name: wormhole-url-db
    environment:
      MYSQL_DATABASE: wormhole
      MYSQL_USER: wormhole
      MYSQL_PASSWORD: wormhole
      MYSQL_ROOT_PASSWORD: root
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - url-data:/var/lib/mysql
  analytics-db:
    image: mysql:8.4
    container_name: wormhole-analytics-db
    environment:
      MYSQL_DATABASE: wormhole
      MYSQL_USER: wormhole
      MYSQL_PASSWORD: wormhole
      MYSQL_ROOT_PASSWORD: root
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - analytics-data:/var/lib/mysql
volumes:
  url-data:
  analytics-data:
