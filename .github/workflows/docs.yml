name: Documentation
on:
  push:
    branches:
      - master
      - main
  pull_request:
permissions:
  contents: read
jobs:
  # Build the documentation for both PRs and branch pushes so docs breakages
  # are caught before merge. Deployment stays in a separate job because PRs
  # should validate the site without publishing it.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean
      - if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
  deploy:
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
