name: Docker
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  packages: write
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main
      - name: Restore and cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          # use flake checks' cache as source of truth
          save: false
          # restore and save a cache using this key
          primary-key: nix-${{ matrix.os }}-docker-${{ hashFiles('**/*.nix', 'Cargo.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ matrix.os }}-
      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image with Nix
        run: nix build .#image
      - name: Load image into Docker
        run: docker load < result
      - name: Tag for push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Tag with arch-specific tag for manifest creation
        run: docker tag "wormhole:latest" "${{ env.IMAGE_NAME }}:${{ matrix.arch }}"
      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "${{ env.IMAGE_NAME }}:${{ matrix.arch }}"
  merge:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Compute image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull images
        run: |
          docker pull "${{ env.IMAGE_NAME }}:amd64"
          docker pull "${{ env.IMAGE_NAME }}:arm64"
      - name: Create manifest list and push
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:amd64 \
            ${{ env.IMAGE_NAME }}:arm64
      - name: Inspect merged image
        run: docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest
