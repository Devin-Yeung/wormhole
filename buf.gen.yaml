# buf.gen.yaml — code generation configuration for the buf toolchain.
#
# Run `buf generate` from the project root to regenerate all proto outputs.
# Go package paths and names are configured here (M opts) rather than in
# the proto files, keeping the protos language-neutral.
version: v2
inputs:
  - directory: proto
plugins:
  # Go message types. Each proto package maps to its own Go package so that
  # consumers can import only what they need, and package-level names are
  # unambiguous even when multiple proto packages are in scope.
  - local: protoc-gen-go
    out: analytics/gen
    opt:
      - Manalytics/v1/analytics.proto=github.com/Devin-Yeung/wormhole/analytics/gen/analytics/v1;analyticsv1
      - Mshortcode/v1/shortcode.proto=github.com/Devin-Yeung/wormhole/analytics/gen/shortcode/v1;shortcodev1
      - Mshortener/v1/shortener.proto=github.com/Devin-Yeung/wormhole/analytics/gen/shortener/v1;shortenerv1
      - Mredirector/v1/redirector.proto=github.com/Devin-Yeung/wormhole/analytics/gen/redirector/v1;redirectorv1
      - paths=source_relative
  # gRPC service stubs (only shortener and redirector define services).
  - local: protoc-gen-go-grpc
    out: analytics/gen
    opt:
      - Manalytics/v1/analytics.proto=github.com/Devin-Yeung/wormhole/analytics/gen/analytics/v1;analyticsv1
      - Mshortcode/v1/shortcode.proto=github.com/Devin-Yeung/wormhole/analytics/gen/shortcode/v1;shortcodev1
      - Mshortener/v1/shortener.proto=github.com/Devin-Yeung/wormhole/analytics/gen/shortener/v1;shortenerv1
      - Mredirector/v1/redirector.proto=github.com/Devin-Yeung/wormhole/analytics/gen/redirector/v1;redirectorv1
      - paths=source_relative
