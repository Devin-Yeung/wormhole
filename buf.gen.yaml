# buf.gen.yaml — code generation configuration for the buf toolchain.
#
# Run `buf generate` from the project root to regenerate all proto outputs.
# Go package paths and names are configured here (M opts) rather than in
# the proto files, keeping the protos language-neutral.
version: v2
inputs:
  - directory: proto
plugins:
  # ── analytics service ──────────────────────────────────────────────────────
  - local: protoc-gen-go
    out: services/analytics/gen
    opt:
      - Manalytics/v1/analytics.proto=github.com/Devin-Yeung/wormhole/analytics/gen/analytics/v1;analyticsv1
      - Mshortcode/v1/shortcode.proto=github.com/Devin-Yeung/wormhole/analytics/gen/shortcode/v1;shortcodev1
      - Mshortener/v1/shortener.proto=github.com/Devin-Yeung/wormhole/analytics/gen/shortener/v1;shortenerv1
      - Mredirector/v1/redirector.proto=github.com/Devin-Yeung/wormhole/analytics/gen/redirector/v1;redirectorv1
      - Mtinyflake/v1/tinyflake.proto=github.com/Devin-Yeung/wormhole/analytics/gen/tinyflake/v1;tinyflakev1
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: services/analytics/gen
    opt:
      - Manalytics/v1/analytics.proto=github.com/Devin-Yeung/wormhole/analytics/gen/analytics/v1;analyticsv1
      - Mshortcode/v1/shortcode.proto=github.com/Devin-Yeung/wormhole/analytics/gen/shortcode/v1;shortcodev1
      - Mshortener/v1/shortener.proto=github.com/Devin-Yeung/wormhole/analytics/gen/shortener/v1;shortenerv1
      - Mredirector/v1/redirector.proto=github.com/Devin-Yeung/wormhole/analytics/gen/redirector/v1;redirectorv1
      - Mtinyflake/v1/tinyflake.proto=github.com/Devin-Yeung/wormhole/analytics/gen/tinyflake/v1;tinyflakev1
      - paths=source_relative
  # ── shortener service ──────────────────────────────────────────────────────
  - local: protoc-gen-go
    out: services/shortener/gen
    opt:
      - Manalytics/v1/analytics.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/analytics/v1;analyticsv1
      - Mshortcode/v1/shortcode.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/shortcode/v1;shortcodev1
      - Mshortener/v1/shortener.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/shortener/v1;shortenerv1
      - Mredirector/v1/redirector.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/redirector/v1;redirectorv1
      - Mtinyflake/v1/tinyflake.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/tinyflake/v1;tinyflakev1
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: services/shortener/gen
    opt:
      - Manalytics/v1/analytics.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/analytics/v1;analyticsv1
      - Mshortcode/v1/shortcode.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/shortcode/v1;shortcodev1
      - Mshortener/v1/shortener.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/shortener/v1;shortenerv1
      - Mredirector/v1/redirector.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/redirector/v1;redirectorv1
      - Mtinyflake/v1/tinyflake.proto=github.com/Devin-Yeung/wormhole/services/shortener/gen/tinyflake/v1;tinyflakev1
      - paths=source_relative
  # ── redirector service ─────────────────────────────────────────────────────
  - local: protoc-gen-go
    out: services/redirector/gen
    opt:
      - Manalytics/v1/analytics.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/analytics/v1;analyticsv1
      - Mshortcode/v1/shortcode.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/shortcode/v1;shortcodev1
      - Mshortener/v1/shortener.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/shortener/v1;shortenerv1
      - Mredirector/v1/redirector.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/redirector/v1;redirectorv1
      - Mtinyflake/v1/tinyflake.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/tinyflake/v1;tinyflakev1
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: services/redirector/gen
    opt:
      - Manalytics/v1/analytics.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/analytics/v1;analyticsv1
      - Mshortcode/v1/shortcode.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/shortcode/v1;shortcodev1
      - Mshortener/v1/shortener.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/shortener/v1;shortenerv1
      - Mredirector/v1/redirector.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/redirector/v1;redirectorv1
      - Mtinyflake/v1/tinyflake.proto=github.com/Devin-Yeung/wormhole/services/redirector/gen/tinyflake/v1;tinyflakev1
      - paths=source_relative
