services:
  redis:
    image: redis:latest
    container_name: wormhole-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
  mysql:
    image: mysql:latest
    container_name: wormhole-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wormhole
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
  tinyflake:
    image: ghcr.io/devin-yeung/wormhole:latest
    container_name: wormhole-tinyflake
    command: tinyflake
    environment:
      - TINYFLAKE_NODE_ID=0
      - TINYFLAKE_START_EPOCH=2024-01-01T00:00:00Z
      - TINYFLAKE_ADDR=0.0.0.0:50053
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=:50053"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
  shortener:
    # TODO: replace with Go image once services/shortener is implemented
    image: ghcr.io/devin-yeung/wormhole-shortener:latest
    container_name: wormhole-shortener
    environment:
      - SHORTENER_MYSQL_DSN=root:root@tcp(mysql:3306)/wormhole
      - SHORTENER_TINYFLAKE_ADDR=tinyflake:50053
      - SHORTENER_ADDR=0.0.0.0:50051
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=:50051"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      mysql:
        condition: service_healthy
      tinyflake:
        condition: service_healthy
  redirector:
    # TODO: replace with Go image once services/redirector is implemented
    image: ghcr.io/devin-yeung/wormhole-redirector:latest
    container_name: wormhole-redirector
    environment:
      - REDIRECTOR_REDIS_URL=redis://redis:6379
      - REDIRECTOR_MYSQL_DSN=root:root@tcp(mysql:3306)/wormhole
      - REDIRECTOR_ADDR=0.0.0.0:50052
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=:50052"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
  gateway:
    image: ghcr.io/devin-yeung/wormhole:latest
    container_name: wormhole-gateway
    command: gateway
    ports:
      - "8080:8080"
    environment:
      - WORMHOLE_GATEWAY_SHORTENER_ADDR=http://shortener:50051
      - WORMHOLE_GATEWAY_REDIRECTOR_ADDR=http://redirector:50052
    depends_on:
      shortener:
        condition: service_healthy
      redirector:
        condition: service_healthy
volumes:
  redis_data:
  mysql_data:
